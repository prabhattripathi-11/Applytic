services:
  ms1:
    build: ../ms1-core-api
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  ms2:
    build: ../ms2-match-agent
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: jobapply
      POSTGRES_PASSWORD: jobapply_dev
      POSTGRES_DB: jobapplymcp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ms1
      - ms2

volumes:
  pgdata: